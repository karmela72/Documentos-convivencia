<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Documentos de Convivencia v2 - IES Reyes Católicos</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #18bc9c;
            --bg-color: #f4f6f9;
            --panel-bg: #ffffff;
            --text-color: #333333;
            --border-color: #d1d8e0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-family: 'Avenir Next', 'Avenir', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* Sidebar Form Control */
        .sidebar {
            width: 450px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            background-color: var(--primary-color);
            color: white;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .sidebar-header p {
            margin: 5px 0 0 0;
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .form-container {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #4b5563;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--secondary-color);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .actions {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background-color: #f8fafc;
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-primary {
            background-color: var(--secondary-color);
            color: white;
        }

        .btn-secondary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* Document Preview Area */
        .preview-area {
            flex-grow: 1;
            background-color: #e5e7eb;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Document Page Styling (A4 Simulation) con letra Avenir Next de 11pt */
        .document-page {
            width: 210mm;
            min-height: 297mm;
            background-color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 25mm 20mm;
            box-sizing: border-box;
            position: relative;
            color: #000;
            font-family: 'Avenir Next', 'Avenir', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 11pt;
            line-height: 1.6;
        }

        /* Document Header con Logos en los márgenes superiores */
        .doc-header {
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 15px;
            margin-bottom: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-placeholder {
            height: 55px;
            display: flex;
            align-items: center;
        }

        .logo-placeholder svg {
            height: 100%;
            max-width: 180px;
        }

        .doc-center-info {
            text-align: center;
            flex-grow: 1;
            padding: 0 10px;
        }

        .doc-center-info h1 {
            margin: 0;
            font-size: 12pt;
            font-weight: bold;
            color: #1a252f;
            text-transform: uppercase;
        }

        .doc-center-info p {
            margin: 2px 0 0 0;
            font-size: 9pt;
            color: #555;
        }

        .doc-title {
            text-align: center;
            font-weight: bold;
            font-size: 13pt;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2c3e50;
        }

        .doc-section {
            margin-bottom: 20px;
            text-align: justify;
        }

        .doc-section-title {
            font-weight: bold;
            color: #2c3e50;
        }

        .doc-footer {
            margin-top: 60px;
            display: flex;
            justify-content: space-between;
        }

        .signature-block {
            width: 45%;
            text-align: center;
            margin-top: 30px;
        }

        .signature-line {
            border-top: 1px solid #000;
            margin-top: 65px;
            padding-top: 5px;
            font-size: 9.5pt;
        }

        /* Print Specific Styles */
        @media print {
            body {
                background-color: white;
                height: auto;
                overflow: visible;
            }
            .sidebar {
                display: none !important;
            }
            .preview-area {
                padding: 0;
                background-color: white;
                overflow: visible;
            }
            .document-page {
                box-shadow: none;
                padding: 0;
                width: 100%;
                min-height: auto;
            }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR CONTROLS -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>IES Reyes Católicos</h2>
            <p>Gestión de Convivencia y Expulsiones</p>
        </div>
        
        <div class="form-container">
            <div class="form-group">
                <label for="template-select">Tipo de Documento</label>
                <select id="template-select" onchange="updateTemplate()">
                    <option value="audiencia-alumno-grave">Trámite de Audiencia a Alumno/a (Gravemente Perjudicial)</option>
                    <option value="audiencia-padres-grave">Trámite de Audiencia a Padres/Tutores (Gravemente Perjudicial)</option>
                    <option value="audiencia-tutor-perjudicial">Trámite de Audiencia a Tutor/a (Conducta Perjudicial)</option>
                    <option value="resolucion-expulsion">Resolución de Expulsión / Sanción</option>
                </select>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">

            <div class="form-group">
                <label for="input-alumno">Nombre del Alumno/a</label>
                <input type="text" id="input-alumno" value="Juan Pérez Gómez" oninput="syncFields()">
            </div>

            <div class="form-group">
                <label for="input-grupo">Grupo / Curso</label>
                <input type="text" id="input-grupo" value="3º ESO B" oninput="syncFields()">
            </div>

            <div class="form-group">
                <label for="input-fecha-doc">Fecha del Documento</label>
                <input type="text" id="input-fecha-doc" value="22 de junio de 2026" oninput="syncFields()">
            </div>

            <div class="form-group">
                <label for="input-hechos">Descripción de los Hechos Presuntos</label>
                <textarea id="input-hechos" oninput="syncFields()">Haber proferido insultos reiterados hacia un miembro del profesorado e interrumpir de forma grave el desarrollo normal de la clase, mostrando un comportamiento desobediente y perturbador.</textarea>
            </div>

            <div class="form-group">
                <label for="input-dias">Número de Días de Suspensión</label>
                <input type="text" id="input-dias" value="5" oninput="syncFields()">
            </div>

            <div class="form-group">
                <label for="input-fechas-suspension">Fechas de la Suspensión (del... al...)</label>
                <input type="text" id="input-fechas-suspension" value="del 23 al 27 de junio de 2026, ambos inclusive" oninput="syncFields()">
            </div>

            <div class="form-group">
                <label for="input-fecha-regreso">Fecha de Incorporación / Aula de Convivencia</label>
                <input type="text" id="input-fecha-regreso" value="28 de junio de 2026" oninput="syncFields()">
            </div>

            <div class="form-group">
                <label for="input-alegaciones">Alegaciones hechas en el acto (si aplica)</label>
                <textarea id="input-alegaciones" oninput="syncFields()">El interesado manifiesta su conformidad con los hechos descritos y muestra arrepentimiento por su conducta.</textarea>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-secondary" onclick="resetForm()">Restablecer</button>
            <button class="btn btn-primary" onclick="window.print()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                Imprimir Documento
            </button>
        </div>
    </div>

    <!-- DOCUMENT PREVIEW AREA -->
    <div class="preview-area">
        <div class="document-page" id="document-content">
            <!-- Dynamic Content Injected Here -->
        </div>
    </div>

        function updateTemplate() {
            const select = document.getElementById('template-select');

        function syncFields() {
            const alumno = document.getElementById('input-alumno').value;
            const grupo = document.getElementById('input-grupo').value;
            const fechaDoc = document.getElementById('input-fecha-doc').value;
            const hechos = document.getElementById('input-hechos').value;
            const dias = document.getElementById('input-dias').value;
            const fechasSuspension = document.getElementById('input-fechas-suspension').value;
            const fechaRegreso = document.getElementById('input-fecha-regreso').value;
            const alegaciones = document.getElementById('input-alegaciones').value;

            const updateElement = (id, value) => {
                const els = document.querySelectorAll('#' + id);
                els.forEach(el => { el.innerText = value; });
            };

            updateElement('field-alumno', alumno);
            updateElement('field-grupo', grupo);
            updateElement('field-fecha-doc', fechaDoc);
            updateElement('field-hechos', hechos);
            updateElement('field-dias', dias);
            updateElement('field-fechas-suspension', fechasSuspension);
            updateElement('field-fecha-regreso', fechaRegreso);
            updateElement('field-alegaciones', alegaciones);
        }
